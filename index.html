<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>epubReader</title>
  <!-- Font CDNs -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500&family=Noto+Serif+SC:wght@400;500&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-lite-webfont@1.1.0/style.css">
  
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="light">

  <!-- Landing / file-picker screen -->
  <div id="landing" class="screen active">
    <div class="landing-card">
      <h1 class="logo">📖 epubReader</h1>
      <p class="tagline">A simple, beautiful reader for EPUB &amp; TXT novels</p>

      <div id="drop-zone" class="drop-zone" role="button" tabindex="0"
           aria-label="Drop a file here or click to choose">
        <div class="drop-icon">📖</div>
        <p>Drop your <strong>.epub</strong> / <strong>.txt</strong> file here</p>
        <p class="sub">or click to <span id="btn-browse-files" style="cursor:pointer; color:var(--accent); text-decoration:underline;">browse files</span></p>
        <p class="sub" style="margin-top: 8px; color:var(--text-muted); font-size: 0.8rem;">Folders can only be opened using the <span id="btn-browse-folder" style="cursor:pointer; color:var(--accent); text-decoration:underline;">browse folder</span> button.</p>
        <div class="sub" style="margin-top: 12px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;">
          <button id="btn-continue-stored" class="icon-btn hidden" style="font-size:0.9rem; padding: 8px 16px;">Continue with Stored Folder</button>
          <button id="btn-load-server" class="icon-btn" style="font-size:0.9rem; padding: 8px 16px; background-color: var(--accent); color: white;">Open 'Stored' Folder</button>
        </div>
      </div>
      <input id="file-input" type="file" accept=".epub,.txt" multiple hidden />
      <input id="folder-input" type="file" webkitdirectory directory hidden />

      <p id="error-msg" class="error hidden"></p>
    </div>
  </div>

  <!-- Reader screen -->
  <div id="reader-screen" class="screen">

    <!-- Top toolbar -->
    <header class="toolbar">
      <button id="btn-back" class="icon-btn" title="Back to file picker" aria-label="Back">&#8592;</button>
      <button id="btn-file-tree-toggle" class="icon-btn hidden" title="File Tree" aria-label="File Tree">📁</button>
      <button id="btn-toc-toggle" class="icon-btn" title="Table of Contents" aria-label="Table of Contents">&#9776;</button>
      <span id="book-title" class="book-title"></span>
      <div class="toolbar-right">
        <select id="font-family-select" class="toolbar-select" title="Change Font">
          <option value="'LXGW WenKai Lite', 'KaiTi', serif">霞鹜文楷</option>
          <option value="'Noto Sans SC', 'Microsoft YaHei', sans-serif">思源黑体</option>
          <option value="'Noto Serif SC', 'SimSun', serif">思源宋体</option>
          <option value="'FangSong', 'STFangsong', serif">仿宋</option>
          <option value="'SimHei', 'Microsoft YaHei', sans-serif">黑体</option>
          <option value="'KaiTi', 'STKaiti', serif">楷体</option>
          <option value="'SimSun', 'NSimSun', serif">宋体</option>
          <option value="Georgia, 'Times New Roman', serif">系统默认衬线</option>
        </select>

        <div class="slider-container" title="Line Spacing">
          <span class="slider-icon">↕</span>
          <input type="range" id="line-spacing-slider" min="1.0" max="3.0" step="0.1" value="1.85" />
        </div>

        <div class="slider-container" title="Content Width">
          <span class="slider-icon">↔</span>
          <input type="range" id="width-slider" min="400" max="2400" step="50" value="720" />
        </div>

        <button id="btn-view-mode" class="icon-btn" title="Toggle Scroll/Page mode" aria-label="Toggle Scroll">⏬</button>
        
        <button id="btn-font-dec" class="icon-btn" title="Decrease font size" aria-label="Decrease font size">A&#8722;</button>
        <button id="btn-font-inc" class="icon-btn" title="Increase font size" aria-label="Increase font size">A&#43;</button>
        <button id="btn-theme" class="icon-btn" title="Toggle dark/light mode" aria-label="Toggle theme">🌙</button>
      </div>
    </header>

    <!-- EPUB viewer (epub.js renders here) -->
    <div id="epub-viewer" class="viewer hidden">
    </div>

    <!-- TOC overlay (click to close) -->
    <div id="toc-overlay" class="toc-overlay"></div>

    <!-- TOC Sidebar -->
    <div id="toc-sidebar" class="sidebar">
      <div class="sidebar-header">
        <h3>Table of Contents</h3>
        <button id="btn-toc-close" class="icon-btn" aria-label="Close Sidebar">&times;</button>
      </div>
      <ul id="toc-list" class="toc-list"></ul>
    </div>

    <!-- File Tree Sidebar -->
    <div id="file-tree-sidebar" class="sidebar">
      <div class="sidebar-header">
        <h3>Files</h3>
        <button id="btn-file-tree-close" class="icon-btn" aria-label="Close Sidebar">&times;</button>
      </div>
      <ul id="file-tree-list" class="file-tree"></ul>
    </div>

    <!-- TXT viewer -->
    <div id="txt-viewer" class="viewer hidden">
      <div id="txt-content" class="txt-content"></div>
    </div>

    <!-- EPUB navigation arrows -->
    <div id="epub-nav" class="nav-bar hidden">
      <button id="btn-prev" class="nav-btn" aria-label="Previous page">&#8249;</button>
      <div class="progress-container">
        <input type="range" id="progress-slider" class="progress-slider" min="0" max="100" step="0.1" value="0" disabled title="Reading Progress" />
        <span id="page-info" class="page-info">0%</span>
      </div>
      <button id="btn-next" class="nav-btn" aria-label="Next page">&#8250;</button>
    </div>
  </div>

  <!-- jszip is required by epub.js -->
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <!-- epub.js from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
